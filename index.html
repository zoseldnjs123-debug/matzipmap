<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111114">
<title>🍜 맛집 지도</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{--bg:#111114;--card:#1c1c21;--card2:#26262c;--ink:#f2f2f5;--sub:#9a9aa3;--accent:#ff6b47;--accent-soft:rgba(255,107,71,.14);--line:#2b2b32;--green:#30d158;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:1001;background:rgba(17,17,20,.88);backdrop-filter:blur(14px);padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;border-bottom:1px solid var(--line)}
  header h1{font-size:19px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  header h1 .count{font-size:12px;color:var(--sub);font-weight:500}
  .hbtns{display:flex;gap:6px;margin-left:auto}
  .hbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer}
  .hbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:5px 12px;font-size:13px;color:var(--sub);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  #map{height:48vh;min-height:280px;border-bottom:1px solid var(--line)}
  .list{padding:12px 16px calc(env(safe-area-inset-bottom) + 90px);display:flex;flex-direction:column;gap:12px}
  .empty{text-align:center;color:var(--sub);font-size:14px;line-height:1.8;padding:40px 20px}
  .empty .big{font-size:40px}
  .card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:16px;cursor:pointer;transition:box-shadow .15s,transform .1s;box-shadow:0 2px 10px rgba(0,0,0,.25)}
  .card:active{transform:scale(.985)}
  .card.hl{box-shadow:0 0 0 2px var(--accent),0 2px 14px rgba(255,107,71,.25)}
  .card .top{display:flex;align-items:flex-start;gap:8px}
  .card h3{font-size:16px;font-weight:700;flex:1;letter-spacing:-.2px}
  .card .region{font-size:11px;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:3px 9px;flex:none;font-weight:600}
  .card .addr{font-size:13px;color:var(--sub);margin-top:5px}
  .card .snippet{font-size:12px;color:var(--sub);margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;opacity:.85}
  .card .acts{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
  .abtn{font-size:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;padding:7px 12px;cursor:pointer;text-decoration:none;color:var(--ink)}
  .abtn.visited{background:var(--green);color:#04210d;border-color:var(--green);font-weight:600}
  .abtn.del{color:#ff7a6e;border-color:rgba(255,122,110,.35)}
  .nopin{font-size:11px;color:#ff9d94;margin-top:5px}
  .sect{font-size:13px;color:var(--sub);margin:14px 2px 2px;font-weight:600}
  .other{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;font-size:13px;color:var(--sub);display:flex;justify-content:space-between;gap:10px;align-items:center}
  .other a{color:var(--accent);text-decoration:none;flex:none;font-size:12px}
  .other .t{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  dialog{border:1px solid var(--line);border-radius:20px;padding:0;width:min(480px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.6);max-height:85vh;overflow-y:auto;background:var(--card);color:var(--ink)}
  dialog::backdrop{background:rgba(0,0,0,.55)}
  .dbody{padding:20px}
  .dbody h2{font-size:17px;margin-bottom:14px}
  .dbody label{font-size:12px;color:var(--sub);display:block;margin:10px 0 4px}
  .dbody input,.dbody textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--ink)}
  .dbody input::placeholder,.dbody textarea::placeholder{color:#5c5c66}
  .dbody input:focus,.dbody textarea:focus{outline:none;border-color:var(--accent)}
  .dbody textarea{height:110px;resize:vertical}
  .drow{display:flex;gap:8px;margin-top:16px}
  .dbtn{flex:1;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:14px;cursor:pointer;background:var(--card2);color:var(--ink)}
  .dbtn.go{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .hint{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.5}
  .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);background:var(--ink);color:#111114;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .toast.show{opacity:1}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--card);color:var(--ink);box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .leaflet-popup-content{font-size:13px;line-height:1.5}
  .leaflet-popup-content b{font-size:14px}
  .leaflet-container a.leaflet-popup-close-button{color:var(--sub)}
  .pop-acts{display:flex;gap:6px;margin-top:8px}
  .pop-acts a{font-size:12px;text-decoration:none;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:4px 8px}
  input[type=file]{display:none}
</style>
</head>
<body>
<header>
  <h1>🍜 맛집 지도 <span class="count" id="count"></span>
    <span class="hbtns">
      <button class="hbtn" id="backupBtn" title="내 데이터 백업">💾</button>
      <button class="hbtn" id="importBtn">📥</button>
      <button class="hbtn primary" id="addBtn">＋ 추가</button>
    </span>
  </h1>
  <div class="chips" id="chips"></div>
</header>
<div id="map"></div>
<div class="list" id="list"></div>
<input type="file" id="fileInput" accept=".json">

<dialog id="addDlg">
  <div class="dbody">
    <h2>새 맛집 추가</h2>
    <label>붙여넣기 (링크·본문 모두 인식)</label>
    <textarea id="fCaption" placeholder="인스타에서 복사한 링크나 본문을 여기에 붙여넣으면 자동으로 인식해요"></textarea>
    <label>게시물 링크</label>
    <input id="fUrl" placeholder="https://www.instagram.com/reel/...">
    <label>가게 이름</label>
    <input id="fName" placeholder="본문에서 자동 추출돼요">
    <label>주소</label>
    <input id="fAddr" placeholder="본문에서 자동 추출돼요">
    <div class="hint">💡 인스타 앱에서: 게시물 ⋯ 메뉴 → 링크 복사 → 여기 붙여넣기. 본문은 캡션을 길게 눌러 복사하거나 직접 입력해주세요.</div>
    <div class="drow">
      <button class="dbtn" id="dCancel">취소</button>
      <button class="dbtn go" id="dSave">지도에 추가</button>
    </div>
  </div>
</dialog>
<div class="toast" id="toast"></div>

<script>
// ───────── 저장소 ─────────
const LS = k => { try{return JSON.parse(localStorage.getItem("matzip_"+k))}catch(e){return null} };
const SET = (k,v) => localStorage.setItem("matzip_"+k, JSON.stringify(v));
let userPlaces = LS("user") || [];
let userOthers = LS("userOthers") || [];
let visited = LS("visited") || {};
let coords = LS("coords") || {};

const allPlaces = () => {
  const seen = new Set(); const out = [];
  userPlaces.forEach(p => { if(!seen.has(p.id)){seen.add(p.id); out.push(p);} });
  return out;
};
const allOthers = () => {
  const urls = new Set(allPlaces().map(p=>p.url)); const seen = new Set(); const out=[];
  userOthers.forEach(o => { if(!urls.has(o.url) && !seen.has(o.url)){seen.add(o.url); out.push(o);} });
  return out;
};

// ───────── 캡션 파서 ─────────
function fixMojibake(s){
  if(!s) return s;
  if(!/[ÃÂì í¬ë]/.test(s)) return s;
  try{ const b=new Uint8Array([...s].map(c=>c.charCodeAt(0)&0xff)); return new TextDecoder("utf-8",{fatal:true}).decode(b); }catch(e){ return s; }
}
const ADDR_RE = /((?:서울(?:특별시)?|경기(?:도)?|인천|부산|대구|대전|광주|울산|세종|강원|충청?[북남]|전라?[북남]|경상?[북남]|제주)[^\n,]*?[가-힣0-9]+(?:로|길|동|가)\s?\d+(?:[-·]\d+)?[^\n]*|[가-힣]+[시군구]\s[가-힣A-Za-z0-9]+(?:로|길)\s?\d+(?:[-·]\d+)?[^\n]*)/;
const URL_RE = /https?:\/\/(?:www\.)?instagram\.com\/(?:reel|p)\/[\w-]+\/?[^\s]*/;

// ───────── 본문 자동 가져오기 (Cloudflare Worker 프록시) ─────────
const PROXY = "https://matzip-proxy.zoseldnjs123.workers.dev";
let _fetchedUrl = "";
async function maybeFetchCaption(r){
  if(!PROXY || !r.url || r.address || _fetchedUrl===r.url) return;
  _fetchedUrl = r.url;
  toast("본문을 불러오는 중…");
  try{
    const res = await fetch(PROXY+"?url="+encodeURIComponent(r.url));
    const j = await res.json();
    if(j.caption){
      const ta=document.getElementById("fCaption");
      ta.value = r.url+"\n\n"+j.caption;
      const r2 = parseCaption(ta.value);
      applyParsed(r2);
      toast("본문을 자동으로 불러왔어요");
      maybeLookupName(r2);
    }else toast("본문을 찾지 못했어요. 이름·주소를 직접 입력해주세요");
  }catch(e){ toast("본문을 불러오지 못했어요. 직접 입력해주세요"); }
}

// 주소로 네이버 플레이스에서 실제 가게 이름·좌표 찾기
let _lookedAddr = "";
async function maybeLookupName(r){
  if(!PROXY) return;
  const addr = (r && r.address) || document.getElementById("fAddr").value.trim();
  if(!addr || _lookedAddr===addr) return;
  const curName = document.getElementById("fName").value.trim();
  if(curName && !/^@?[A-Za-z0-9._]+$/.test(curName)) return; // 제대로 된 이름이 이미 있으면 유지
  _lookedAddr = addr;
  try{
    const res = await fetch(PROXY+"?place="+encodeURIComponent(addr));
    const j = await res.json();
    if(j && j.lat && j.lng){ coords[addr]=[j.lat,j.lng]; SET("coords",coords); } // 정확한 좌표 확보
    if(j && j.name){
      document.getElementById("fName").value = j.name;
      toast("가게 이름을 찾았어요: "+j.name);
    }
  }catch(e){}
}
function parseCaption(text){
  const res = {name:"", address:"", url:""};
  if(!text) return res;
  const um = text.match(URL_RE);
  if(um) res.url = um[0].split("?")[0];
  const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  for(const l of lines){
    const m = l.match(/^[-•]?\s*(?:주소|위치|장소)\s*[:：]\s*(.+)/);
    if(m){ res.address = m[1].trim(); break; }
  }
  if(!res.address){
    for(const l of lines){
      if(/팔로우|공유|저장|댓글|이벤트/.test(l)) continue;
      const m = l.match(ADDR_RE);
      if(m){ res.address = m[1].replace(/^[^가-힣]*/,"").trim(); break; }
    }
  }
  for(const l of lines){
    const m = l.match(/^[-•]?\s*(?:매장|상호|가게|가게명|장소명|매장명)\s*[:：]\s*(.+)/);
    if(m){ res.name = m[1].trim(); break; }
  }
  if(!res.name && res.address){
    const idx = lines.findIndex(l=>l.includes(res.address.slice(0,8)));
    if(idx>0){
      const prev = lines[idx-1];
      const em = prev.match(/^([^\w\s가-힣]+)\s*(.+)/u);
      const cand = em ? em[2] : prev;
      if(cand && cand.length<=30 && !ADDR_RE.test(prev) && !/추천|후기|저장|공유/.test(cand) && !/^@?[A-Za-z0-9._]+$/.test(cand.trim())) res.name = cand.trim();
    }
  }
  res.address = res.address.replace(/[📍🥢🍠➡️🏠🛖]|\s{2,}/gu," ").trim();
  return res;
}

// ───────── 지오코딩 (Nominatim, 캐시) ─────────
const _retried={};
async function geocode(addr){
  if(coords[addr]) return coords[addr];
  if(coords[addr]===null){ if(_retried[addr]) return null; _retried[addr]=1; } // 이전 실패 주소도 세션당 1회 재시도
  const clean = addr.replace(/\(.*?\)/g,"").replace(/\s?\d+층.*$|\s?지하.*$/,"").trim();
  const qs = [clean, clean.split(/\s/).slice(0,4).join(" ")];
  const jb = clean.match(/^(.*?[가-힣](?:동|리|가|로|길))\s*\d/);
  if(jb) qs.push(jb[1]); // 지번 인식 실패 시 동·길 단위로라도 핀 찍기
  for(const q of [...new Set(qs)]){
    try{
      const r = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=kr&q="+encodeURIComponent(q),{headers:{"Accept-Language":"ko"}});
      const j = await r.json();
      if(j && j[0]){ const c=[+j[0].lat, +j[0].lon]; coords[addr]=c; SET("coords",coords); return c; }
    }catch(e){}
    await new Promise(r=>setTimeout(r,1100));
  }
  coords[addr]=null; SET("coords",coords);
  return null;
}

// ───────── 지도 ─────────
const map = L.map("map",{zoomControl:false}).setView([37.5665,126.978],12);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
let markers = {};

function naverLink(p){ const handle=/^@?[A-Za-z0-9._]+$/.test((p.name||"").trim()); return "https://map.naver.com/p/search/"+encodeURIComponent((!p.name||handle||p.name.startsWith("📍"))?p.address:p.name); }
function markerFor(p, ll){
  const icon = L.divIcon({className:"", html:`<div style="font-size:26px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))">${visited[p.id]?"✅":"📍"}</div>`, iconSize:[26,26], iconAnchor:[13,24]});
  const mk = L.marker(ll,{icon}).addTo(map);
  mk.bindPopup(`<b>${p.name}</b><br>${p.address}<div class="pop-acts">
    <a href="${naverLink(p)}" target="_blank">네이버지도</a>
    <a href="${p.url}" target="_blank">릴스 보기</a></div>`);
  mk.on("click",()=>{ highlight(p.id); });
  return mk;
}

// ───────── 렌더 ─────────
let filterRegion = "전체", filterVisit = "all";
const regionOf = p => (p.address.match(/([가-힣]+[구군시])(?=\s)/)||[])[1] || "기타";

function renderChips(){
  const regions = [...new Set(allPlaces().map(regionOf))];
  const c = document.getElementById("chips");
  c.innerHTML = "";
  const mk=(label,on,fn)=>{const b=document.createElement("button");b.className="chip"+(on?" on":"");b.textContent=label;b.onclick=fn;c.appendChild(b);};
  mk("전체", filterRegion==="전체"&&filterVisit==="all", ()=>{filterRegion="전체";filterVisit="all";render();});
  regions.forEach(r=>mk(r, filterRegion===r, ()=>{filterRegion=filterRegion===r?"전체":r;render();}));
  mk("🔖 가볼 곳", filterVisit==="no", ()=>{filterVisit=filterVisit==="no"?"all":"no";render();});
  mk("✅ 가본 곳", filterVisit==="yes", ()=>{filterVisit=filterVisit==="yes"?"all":"yes";render();});
}

function passes(p){
  if(filterRegion!=="전체" && regionOf(p)!==filterRegion) return false;
  if(filterVisit==="yes" && !visited[p.id]) return false;
  if(filterVisit==="no" && visited[p.id]) return false;
  return true;
}

async function render(){
  renderChips();
  const list = document.getElementById("list");
  const places = allPlaces().filter(passes);
  document.getElementById("count").textContent = allPlaces().length ? allPlaces().length+"곳" : "";
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
  list.innerHTML = "";
  if(!allPlaces().length && !allOthers().length){
    list.innerHTML = `<div class="empty"><div class="big">🗺️</div>
      아직 저장된 맛집이 없어요.<br>
      <b>＋ 추가</b>로 인스타 게시물을 붙여넣거나,<br>
      <b>📥</b>로 인스타그램 내보내기 파일(saved_posts.json)을 불러오세요.</div>`;
    return;
  }
  for(const p of places){
    const card = document.createElement("div");
    card.className="card"; card.id="card-"+p.id;
    card.innerHTML = `<div class="top"><h3>${visited[p.id]?"✅ ":""}${p.name}</h3><span class="region">${regionOf(p)}</span></div>
      <div class="addr">📍 ${p.address}</div>
      ${p.snippet?`<div class="snippet">${p.snippet}</div>`:""}
      <div class="acts">
        <a class="abtn" href="${naverLink(p)}" target="_blank" onclick="event.stopPropagation()">🧭 네이버지도</a>
        <a class="abtn" href="${p.url}" target="_blank" onclick="event.stopPropagation()">🎬 릴스</a>
        <button class="abtn ${visited[p.id]?"visited":""}" onclick="toggleVisit(event,'${p.id}')">${visited[p.id]?"✓ 가봤어요":"가봤어요?"}</button>
        <button class="abtn del" onclick="delPlace(event,'${p.id}')">삭제</button>
      </div>`;
    card.onclick = ()=>{ const m=markers[p.id]; if(m){ map.setView(m.getLatLng(),16); m.openPopup(); } };
    list.appendChild(card);
  }
  const others = allOthers();
  if(others.length){
    const s=document.createElement("div"); s.className="sect"; s.textContent="🗂 맛집 외 저장 게시물 ("+others.length+")"; list.appendChild(s);
    others.forEach(o=>{ const d=document.createElement("div"); d.className="other";
      d.innerHTML=`<span class="t">${o.t||o.url}</span><a href="${o.url}" target="_blank">보기 ›</a>`; list.appendChild(d); });
  }
  const lls=[];
  for(const p of places){
    const ll = await geocode(p.address);
    if(ll){ markers[p.id]=markerFor(p,ll); lls.push(ll); }
    else{ const c=document.getElementById("card-"+p.id); if(c && !c.querySelector(".nopin")){ const n=document.createElement("div"); n.className="nopin"; n.textContent="⚠️ 지도 좌표를 못 찾았어요 — 네이버지도 버튼으로 확인해주세요"; c.querySelector(".addr").after(n);} }
  }
  if(lls.length) map.fitBounds(L.latLngBounds(lls).pad(0.25));
}

function highlight(id){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("hl"));
  const c=document.getElementById("card-"+id);
  if(c){ c.classList.add("hl"); c.scrollIntoView({behavior:"smooth",block:"nearest"}); }
}
window.toggleVisit = (e,id)=>{ e.stopPropagation(); visited[id]=!visited[id]; if(!visited[id])delete visited[id]; SET("visited",visited); render(); };
window.delPlace = (e,id)=>{ e.stopPropagation(); if(!confirm("이 맛집을 목록에서 삭제할까요?")) return; userPlaces=userPlaces.filter(p=>p.id!==id); SET("user",userPlaces); render(); };

// ───────── 추가 다이얼로그 ─────────
const dlg=document.getElementById("addDlg");
function applyParsed(r){
  if(r.url && !document.getElementById("fUrl").value) document.getElementById("fUrl").value=r.url;
  if(r.name && !document.getElementById("fName").value) document.getElementById("fName").value=r.name;
  if(r.address) document.getElementById("fAddr").value=r.address;
}
async function openAdd(prefill){
  ["fUrl","fCaption","fName","fAddr"].forEach(i=>document.getElementById(i).value="");
  _fetchedUrl=""; _lookedAddr="";
  if(prefill){ const r=parseCaption(prefill); document.getElementById("fCaption").value=prefill; applyParsed(r); maybeFetchCaption(r); maybeLookupName(r); }
  else if(navigator.clipboard && navigator.clipboard.readText){
    try{
      const t = await navigator.clipboard.readText();
      if(t && (URL_RE.test(t) || ADDR_RE.test(t))){
        const r=parseCaption(t);
        document.getElementById("fCaption").value=t; applyParsed(r);
        toast("클립보드 내용을 자동으로 불러왔어요");
        maybeFetchCaption(r); maybeLookupName(r);
      }
    }catch(e){}
  }
  dlg.showModal();
}
document.getElementById("addBtn").onclick=()=>openAdd();
document.getElementById("dCancel").onclick=()=>dlg.close();
document.getElementById("fCaption").addEventListener("input",e=>{const r=parseCaption(e.target.value); applyParsed(r); maybeFetchCaption(r); maybeLookupName(r);});
document.getElementById("dSave").onclick=()=>{
  const url=document.getElementById("fUrl").value.trim();
  const name=document.getElementById("fName").value.trim();
  const addr=document.getElementById("fAddr").value.trim();
  const cap=document.getElementById("fCaption").value.trim();
  if(!addr){ toast("주소를 입력해주세요"); return; }
  const finalName = name || "📍 "+addr.split(/\s+/).slice(-2).join(" ");
  const id=(url.match(/\/(?:reel|p)\/([\w-]+)/)||[])[1] || "u"+Date.now();
  userPlaces.push({id,name:finalName,address:addr,url:url||"#",tags:[],snippet:cap.replace(URL_RE,"").split("\n").filter(Boolean)[0]?.slice(0,80)||""});
  SET("user",userPlaces); dlg.close(); toast("추가했어요! 지도에 핀을 찍는 중…"); render();
};

// ───────── 파일 가져오기 (인스타 내보내기 or 백업) ─────────
document.getElementById("importBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").addEventListener("change", async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(data && data.__matzip_backup){
      userPlaces=data.places||[]; userOthers=data.others||[]; visited=data.visited||{};
      SET("user",userPlaces); SET("userOthers",userOthers); SET("visited",visited);
      toast("백업을 복원했어요"); render(); e.target.value=""; return;
    }
    const items=Array.isArray(data)?data:(data.saved_saved_media||[]);
    let added=0, other=0;
    for(const it of items){
      let url="",cap="";
      for(const lv of (it.label_values||[])){
        const label=fixMojibake(lv.label||"");
        if(label==="URL"&&lv.value) url=lv.value;
        if(label==="캡션") cap=fixMojibake(lv.value||"");
      }
      if(!url) continue;
      const id=(url.match(/\/(?:reel|p)\/([\w-]+)/)||[])[1]||url;
      if(allPlaces().some(p=>p.id===id)) continue;
      const r=parseCaption(cap);
      if(r.address){ userPlaces.push({id,name:r.name||"이름 미확인",address:r.address,url,tags:[],snippet:cap.split("\n").filter(Boolean)[0]?.slice(0,80)||""}); added++; }
      else if(!allOthers().some(o=>o.url===url)){ userOthers.push({url,t:cap.split("\n").filter(Boolean)[0]?.slice(0,60)||url}); other++; }
    }
    SET("user",userPlaces); SET("userOthers",userOthers);
    toast(`맛집 ${added}곳 추가, 기타 ${other}건 보관`); render();
  }catch(err){ toast("파일을 읽지 못했어요 — saved_posts.json 또는 백업 파일인지 확인해주세요"); }
  e.target.value="";
});

// ───────── 백업 ─────────
document.getElementById("backupBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify({__matzip_backup:1,places:userPlaces,others:userOthers,visited},null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="matzip-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  toast("백업 파일을 내려받았어요 — 다른 기기에서 📥로 복원하세요");
};

// ───────── 공유 타겟 (인스타 공유 → 앱) ─────────
(function(){
  const sp=new URLSearchParams(location.search);
  const shared=[sp.get("title"),sp.get("text"),sp.get("url")].filter(Boolean).join("\n");
  if(shared){ history.replaceState(null,"",location.pathname); openAdd(shared); }
})();

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2600); }

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
render();
</script>
</body>
</html>
